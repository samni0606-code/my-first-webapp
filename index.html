<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASF Yeosu EHS Dashboard V4</title>
  <style>
    :root{
      --bg:#eef3f8;
      --card:#fff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#dbe4ee;
      --navy:#071225;
      --blue:#2563eb;
      --green:#059669;
      --amber:#d97706;
      --red:#dc2626;
      --purple:#7c3aed;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    .wrap{
      max-width:1540px;
      margin:0 auto;
      padding:22px;
    }

    .hero{
      background:radial-gradient(circle at top right,#1d4ed8 0,#0f172a 34%,#071225 100%);
      border-radius:28px;
      color:#fff;
      padding:26px;
      box-shadow:0 20px 50px rgba(15,23,42,.22);
    }

    .heroTop{
      display:grid;
      grid-template-columns:1.4fr .8fr;
      gap:18px;
      align-items:stretch;
    }

    .eyebrow{
      margin:0 0 8px;
      color:#bfdbfe;
      font-size:13px;
    }

    .title{
      margin:0;
      font-size:clamp(30px,4vw,48px);
      letter-spacing:-.05em;
    }

    .desc{
      color:#dbeafe;
      margin:10px 0 0;
      font-size:15px;
    }

    .heroActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      border:0;
      border-radius:13px;
      font-weight:800;
      padding:10px 14px;
      cursor:pointer;
    }

    .btnPrimary{
      background:#3b82f6;
      color:#fff;
    }

    .btnGhost{
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }

    .btnLight{
      background:#f8fafc;
      border:1px solid var(--line);
      color:#0f172a;
    }

    .btnDanger{
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    .weather{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
      border-radius:24px;
      padding:18px;
      min-height:190px;
    }

    .weatherHead{
      display:flex;
      justify-content:space-between;
      gap:12px;
    }

    .weatherTitle{
      font-weight:900;
      font-size:18px;
    }

    .weatherNow{
      display:flex;
      align-items:flex-end;
      gap:10px;
      margin-top:22px;
    }

    .temp{
      font-size:54px;
      line-height:.85;
      font-weight:900;
      letter-spacing:-.06em;
    }

    .condition{
      font-size:18px;
      font-weight:800;
    }

    .weatherGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:18px;
    }

    .weatherBox{
      background:rgba(255,255,255,.10);
      border-radius:14px;
      padding:11px;
    }

    .weatherBox small{
      display:block;
      color:#bfdbfe;
      font-size:11px;
    }

    .weatherBox b{
      font-size:16px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(6,minmax(120px,1fr));
      gap:10px;
      margin-top:18px;
    }

    .metric{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:14px;
    }

    .metric .num{
      font-size:30px;
      font-weight:900;
    }

    .metric .label{
      font-size:12px;
      color:#cbd5e1;
      margin-top:3px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 380px;
      gap:18px;
      margin-top:18px;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px;
      box-shadow:0 8px 22px rgba(15,23,42,.06);
    }

    .panelTitle{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin:0 0 12px;
    }

    .panelTitle h2{
      margin:0;
      font-size:21px;
      letter-spacing:-.03em;
    }

    .note{
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
      margin:8px 0 0;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin:14px 0;
    }

    .leftTools,
    .rightTools{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    input,
    select,
    textarea{
      font:inherit;
      border:1px solid #cbd5e1;
      border-radius:12px;
      padding:10px 12px;
      background:#fff;
    }

    input[type=search]{
      width:min(360px,80vw);
    }

    .tabs{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin:8px 0 14px;
    }

    .tab{
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .tab.active{
      background:#0f172a;
      color:#fff;
      border-color:#0f172a;
    }

    .tableWrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:18px;
      max-height:720px;
    }

    table{
      width:100%;
      min-width:1280px;
      border-collapse:collapse;
    }

    th,
    td{
      border-bottom:1px solid var(--line);
      padding:11px 10px;
      text-align:left;
      vertical-align:middle;
      font-size:13px;
    }

    th{
      position:sticky;
      top:0;
      z-index:1;
      background:#f8fafc;
      color:#334155;
    }

    tbody tr:hover td{
      background:#f8fafc;
    }

    .tankNo{
      font-weight:900;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .bOk{
      background:#dcfce7;
      color:#166534;
    }

    .bSoon180{
      background:#fef3c7;
      color:#92400e;
    }

    .bSoon90{
      background:#ffedd5;
      color:#9a3412;
    }

    .bOver{
      background:#fee2e2;
      color:#991b1b;
    }

    .bBlank{
      background:#e2e8f0;
      color:#334155;
    }

    .bType{
      background:#e0f2fe;
      color:#075985;
    }

    .bTeam{
      background:#ede9fe;
      color:#5b21b6;
    }

    .dday{
      font-weight:900;
    }

    .overText{
      color:var(--red);
    }

    .soonText{
      color:var(--amber);
    }

    .okText{
      color:var(--green);
    }

    .scheduleList{
      display:grid;
      gap:10px;
    }

    .schedule{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:#fff;
    }

    .scheduleTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:start;
    }

    .scheduleName{
      font-size:16px;
      font-weight:900;
    }

    .scheduleMeta{
      margin-top:5px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .scheduleDate{
      font-weight:900;
    }

    .quickAdd{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-top:12px;
    }

    .quickAdd input,
    .quickAdd select{
      width:100%;
      font-size:13px;
    }

    .quickAdd .wide{
      grid-column:span 2;
    }

    .quickAdd .full{
      grid-column:1/-1;
    }

    .modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.58);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }

    .modal{
      background:#fff;
      border-radius:24px;
      width:min(780px,100%);
      max-height:92vh;
      overflow:auto;
      padding:20px;
      box-shadow:0 24px 70px rgba(0,0,0,.32);
    }

    .formGrid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .field{
      display:grid;
      gap:4px;
    }

    .field label{
      font-size:12px;
      font-weight:800;
      color:var(--muted);
    }

    .field.full{
      grid-column:1/-1;
    }

    .modalFooter{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      margin-top:14px;
    }
